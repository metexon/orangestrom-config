#############################################################################
#   External Config Includes
#############################################################################
[include mainsail.cfg]          ; mainsail runs on port 81 (http://IP_ADDRESS:81)
[include fluidd.cfg]
[include KAMP_Settings.cfg]
[include ./KAMP/Smart_Park.cfg]
[include ./KAMP/Line_Purge.cfg]
#[include klipper_debug.cfg]

#############################################################################
#   CAN Bus Config
#############################################################################

[include printer_mcu.cfg]
[include printer_mcu1.cfg]

#############################################################################
# Pellet Extruder Metexon MTX6
#############################################################################

# load Metetxon toolboard module, defines mtx temperature sensor type
[metexon_toolboard mtx6]
board_mcu: mcu1

[extruder]
step_pin: mcu1:PIN_STEP
dir_pin: mcu1:PIN_DIR
enable_pin: !mcu1:PIN_EN
microsteps: 16
rotation_distance: 1.538 
nozzle_diameter: 0.400
filament_diameter: 1.750
sensor_type: mtx                 # use mtx temperature sensor type
mtx_board: mtx6                  # toolboard ID
mtx_sensor_channel: t1           # t1 is heating zone 1 (tip)
heater_pin: mcu1:PIN_UNUSED_1    # just to make klipper happy
                                 # heating is handed over to MTX6 firmware
control: watermark               # required, but no effect, heating is done by MTX6 firmware
min_temp: 10
max_temp: 320
min_extrude_temp: 10 # allow cold extrusion for testing
max_extrude_cross_section: 5  # allow long extrudes
max_extrude_only_distance: 100 # allow long extrudes
max_extrude_only_accel: 400 # for retractions


# MTX6 second heating zone
[heater_generic Extruder_T2]
sensor_type: mtx                 # use mtx temperature sensor type
mtx_board: mtx6                  # toolboard ID
mtx_sensor_channel: t2           # t2 is heating zone 2 (barrel)
heater_pin: mcu1:PIN_UNUSED_2    # just to make klipper happy
                                 # heating is handed over to MTX6 firmware
control: watermark               # required, but no effect, heating is done by MTX6 firmware
min_temp: 10
max_temp: 320

[verify_heater extruder]
max_error: 120
check_gain_time: 50
hysteresis: 10
heating_gain: 2


[verify_heater Extruder_T2]
max_error: 120
check_gain_time: 50
hysteresis: 10
heating_gain: 2


# part cooling fan. replaces [fan] section
[metexon_fan]
mtx_board: mtx6
# pin and tachometer are handled by metexon_fan module


# TMC driver configuration for MTX6
[tmc5160 extruder]
spi_software_sclk_pin: mcu1:PIN_TMC_SCK
spi_software_mosi_pin: mcu1:PIN_TMC_MOSI  
spi_software_miso_pin: mcu1:PIN_TMC_MISO
spi_speed: 400000          
cs_pin: mcu1:PIN_TMC_CSN
sense_resistor: 0.05               # Ω – value on your board
run_current: 1.75                  # RMS Amps
hold_current: 0.10
stealthchop_threshold: 0
diag0_pin: ^!mcu1:PIN_TMC_DIAG0


# Temperature sensor Metexon toolboard, extruder body
[temperature_sensor MTX6_Body]
sensor_type: mtx
mtx_board: mtx6
mtx_sensor_channel: body

# Temperature sensor Metexon toolboard, ESP32 internal temperature
# comment in to activate
#[temperature_sensor MTX6_ESP32]
#sensor_type: mtx
#mtx_board: mtx6
#mtx_sensor_channel: esp32


# Temperature sensor Metexon toolboard, RP2040 internal temperature
# comment in to activate
#[temperature_sensor MTX6_rp2040]
#sensor_type: temperature_mcu
#sensor_mcu: mcu1


# example macro to get MTX6 status
[gcode_macro QUERY_MTX6]
gcode:
    # "mtx6" is the toolboard ID defined above in [metexon_toolboard mtx6]
    {% set mtx = printer["mtx6"] %}
    {action_respond_info(
        "Temperature 1: %.1f C\n"
        "Temperature 2: %.1f C\n"
        "Setpoint Temperature 1: %.1f C\n"
        "Setpoint Temperature 2: %.1f C\n"
        "PWM 1: %.2f\n"
        "PWM 2: %.2f\n"
        "Body Temperature: %.1f C\n"
        "ESP32 Temperature: %.1f C\n"
        "Fan Speed: %.0f %%\n"
        "Fan RPM: %.0f RPM\n"
        "Body Fan Speed: %.0f %%\n"
        "Body Fan RPM: %.0f RPM"
         % (
            mtx.temperature1,
            mtx.temperature2,
            mtx.setpoint_temperature1,
            mtx.setpoint_temperature2,
            mtx.pwm1,
            mtx.pwm2,
            mtx.temperature_body,
            mtx.temperature_esp32,
            mtx.fan_speed * 100,
            mtx.fan_rpm,
            mtx.fan_body_speed * 100,
            mtx.fan_body_rpm
            ))}


##   Probe Config
# BIQU MicroProbe v2
# https://github.com/bigtreetech/MicroProbe
[output_pin probe_enable]
pin: mcu1:PIN_GPIO_EXT1
value: 0

[gcode_macro PROBE_DEPLOY]
gcode:
    SET_PIN PIN=probe_enable VALUE=1


[gcode_macro PROBE_STOW]
gcode:
    SET_PIN PIN=probe_enable VALUE=0

[probe]
pin: ^!mcu1:PIN_GPIO_EXT2 # v2 is tigger on low-level
deactivate_on_each_sample: False
speed: 5.0
activate_gcode:
    PROBE_DEPLOY
    G4 P500 # wait 0.5s
deactivate_gcode:
    PROBE_STOW
x_offset: 0.0
y_offset: 30.0
z_offset: 0.1



[board_pins]
mcu: mcu1
aliases:
    # extruder stepper driver pins (TMC5160)
    PIN_STEP=gpio25,
    PIN_DIR=gpio24,
    PIN_EN=gpio23,
    
    # TMC5160 SPI 
    PIN_TMC_MOSI=gpio19,  # SPI MOSI
    PIN_TMC_MISO=gpio20,  # SPI MISO
    PIN_TMC_SCK=gpio21,   # SPI SCK
    PIN_TMC_CSN=gpio22,   # SPI CSN
    PIN_TMC_DIAG0=gpio18, # TMC DIAG0

    PIN_LED=gpio5,

    PIN_SCL=gpio7, # mcu interconnect, used internally
    PIN_SDA=gpio6, # mcu interconnect, used internally

    #  extension ports on the board
    #
    #  Expansion port 1, JST XH 4-pin:
    #  pin 1: 5V
    #  pin 2: GPIO_EXT1
    #  pin 3: GND
    #  pin 4: GPIO_EXT2
    #
    #  Expansion port 2, JST XH 4-pin:
    #  pin 1: 5V
    #  pin 2: GPIO_EXT3
    #  pin 3: GND
    #  pin 4: GPIO_EXT4

    PIN_GPIO_EXT1=gpio26,
    PIN_GPIO_EXT2=gpio27,
    PIN_GPIO_EXT3=gpio28,
    PIN_GPIO_EXT4=gpio29,

    # pins not connected to anything
    PIN_UNUSED_1=gpio2,
    PIN_UNUSED_2=gpio3,
    PIN_UNUSED_3=gpio4,


#############################################################################
#   Printer Config
#############################################################################


[printer]
kinematics:cartesian
max_velocity: 500
max_accel: 5000
max_z_velocity: 20
max_z_accel: 200
square_corner_velocity: 5.0
minimum_cruise_ratio: 0.0

[respond]
[gcode_arcs]
[pause_resume]
[display_status]
[exclude_object]
[firmware_retraction]
[virtual_sdcard]
path: ~/printer_data/gcodes
[force_move]
enable_force_move : True
[idle_timeout]
timeout: 2100                  ; 35min idle timeout (when not paused or printing)

#############################################################################
#   Print Start & End Macros
#############################################################################

[gcode_macro PRINT_START]         
gcode:
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=flag_print_status VALUE="{0}"
    M400
    SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=flag_print_status VALUE="{1}"
    M400
    SAVE_VARIABLE VARIABLE=was_interrupted VALUE=True
    G92 E0
    BED_MESH_CLEAR                                           
    G90
    BED_MESH_PROFILE LOAD=default   
    CLEAR_PAUSE
    # C1  
    M117 Printing
                     
[gcode_macro PRINT_END]
gcode:
    SAVE_VARIABLE VARIABLE=was_interrupted VALUE=False
    clear_last_file
    {% set RUN_VELOCITY = printer.configfile.settings['printer'].max_velocity|float %}
    {% set RUN_ACCEL    = printer.configfile.settings['printer'].max_accel|float %}
    {% set RUN_DECEL    = printer.configfile.settings['printer'].max_accel|float %}
    M400
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=flag_print_status VALUE="{0}"
    M400
    SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=flag_print_status VALUE="{1}"
    M400
    SET_VELOCITY_LIMIT VELOCITY={RUN_VELOCITY} ACCEL={RUN_ACCEL} ACCEL_TO_DECEL={RUN_DECEL}
    M220 S100
    M221 S100
    {% set z = params.Z|default(200)|int %}
    {% if (printer.gcode_move.position.z+10) < z %}   #If the current gcode-Z position is less than the maximum limit position
      G90                            ; absolute positioning
      G1 Z{z+10} F6000                ; park nozzle at rear
    {% endif %}
    TURN_OFF_HEATERS
    M107
    M84

#############################################################################
#   Pause, Resume & Cancel Macros
#############################################################################

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
variable_flag_print_status: 1
variable_flag_home_x: 0
variable_flag_home_y: 0
gcode:
    {%if flag_home_x > 0.5 and flag_home_y > 0.5%}
      {% if flag_print_status > 0.5 %}
        M400  
      {% set z = params.Z|default(200)|int %}                                                   
      {% set E = (params.E|default(2))|float %}
      {% set x_park = params.X|default(printer.toolhead.axis_minimum.x+30)|int %} 
      {% set y_park = params.Y|default(printer.toolhead.axis_minimum.y+30)|int %} 
        M400
      {% set position = printer.gcode_move.gcode_position %}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=saved_x VALUE="{position.x}"
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=saved_y VALUE="{position.y}"
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=saved_z VALUE="{position.z}"
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=saved_e VALUE="{position.e}"
      {% if printer[printer.toolhead.extruder].temperature > 150 %}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=etemp VALUE={printer['extruder'].target}
      {% endif %}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=bed_temp VALUE={printer['heater_bed'].target}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=bed_temp1 VALUE={printer['heater_generic heater_bed1'].target}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=bed_temp2 VALUE={printer['heater_generic heater_bed2'].target}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=bed_temp3 VALUE={printer['heater_generic heater_bed3'].target}
        SAVE_GCODE_STATE NAME=timelapse_state_a
        M83
        G91
        G1 E-2 X3 Z1 F2100
        G1 Z4 F600
        SAVE_GCODE_STATE NAME=timelapse_state_b
        G90
      {% if (printer.gcode_move.position.z+10) < z %} 
        G1 Z{z+10} X{x_park} Y{y_park} E-20 F6000 
      {% else %}
        G1 X{x_park} Y{y_park} E-20 F6000
      {% endif %}
        M400
        SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=flag_print_status VALUE="{0}"
        M400
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=flag_print_status VALUE="{1}"
        M25
        SET_IDLE_TIMEOUT TIMEOUT=1800
        M400
      {% endif %}
    {% endif %}

[gcode_macro RESUME]
rename_existing: BASE_RESUME
variable_flag_print_status: 1
variable_zhop: 0
variable_etemp: 0
variable_bed_temp: 0
variable_bed_temp1: 0
variable_bed_temp2: 0
variable_bed_temp3: 0
variable_saved_x: 0.0
variable_saved_y: 0.0
variable_saved_z: 0.0
variable_saved_e: 0.0
gcode:
    {% if flag_print_status > 0.5 %}
    M25
    {% set e = params.E|default(2)|int %}   
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={etemp}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bed_temp}
    SET_HEATER_TEMPERATURE HEATER=heater_bed1 TARGET={bed_temp1}
    SET_HEATER_TEMPERATURE HEATER=heater_bed2 TARGET={bed_temp2}
    SET_HEATER_TEMPERATURE HEATER=heater_bed3 TARGET={bed_temp3}
    {% if printer[printer.toolhead.extruder].temperature < etemp-4 %}
      TEMPERATURE_WAIT SENSOR=extruder MINIMUM={etemp-4} MAXIMUM={etemp+50}
    {% endif %}
    M400
    G91
    M83
    G1 E100 F200	
    G4 P2000	
    G1 X-20 F15000
    G1 X20
    G1 X-20
    G1 X20
    G1 X-20
    G1 X20
    G90
    G92 E{saved_e}
    M400
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=flag_print_status VALUE="{0}"
    M400
    SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=flag_print_status VALUE="{1}"
    M400
    RESTORE_GCODE_STATE NAME=timelapse_state_b MOVE=1 MOVE_SPEED=250
    M400
    RESTORE_GCODE_STATE NAME=timelapse_state_a MOVE=1 MOVE_SPEED=50	
    M400
    M24
    {% else %}
    M400
    {% endif %}

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
variable_flag_home_x: 0
variable_flag_home_y: 0
gcode:
      clear_last_file    
      M400
      SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=flag_print_status VALUE="{0}"
      M400
      SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=flag_print_status VALUE="{1}"
      M400
      {% set RUN_VELOCITY = printer.configfile.settings['printer'].max_velocity|float %}
      {% set RUN_ACCEL    = printer.configfile.settings['printer'].max_accel|float %}
      {% set RUN_DECEL    = printer.configfile.settings['printer'].max_accel|float %}
      SET_VELOCITY_LIMIT VELOCITY={RUN_VELOCITY} ACCEL={RUN_ACCEL} ACCEL_TO_DECEL={RUN_DECEL}
      {% set z = params.Z|default(200)|int %}  
      {% set x_park = params.X|default(printer.toolhead.axis_minimum.x+30)|int %} 
      {% set y_park = params.Y|default(printer.toolhead.axis_minimum.y+30)|int %} 
      SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout} 
      SDCARD_RESET_FILE
      M220 S100
      M221 S100
      {%if flag_home_x > 0.5 and flag_home_y > 0.5%}
        M400                          ; wait for buffer to clear
        M83                           ; zero the extruder
        G1 E-2.0 F1200               ; retract filament
        {%if (printer.gcode_move.position.z+10) < z %}
        G90 
        G1 X{x_park} Y{y_park} Z{z+10} F6000 
        {% else %}
        G91                           ; relative positioning
        G1 Z5 F600
        G90 
        G1 X{x_park} Y{y_park} F6000 
        {% endif %}
      {% else %}
      G91
      G1 Z5 F600
      {% endif %}        
      TURN_OFF_HEATERS
      M107                           ; turn off fan
      G90
      M82
      M84
      

#############################################################################
#  Material Change Macros
#############################################################################

[gcode_macro m600]
description: Pauses the current print.
gcode:
  PAUSE 
  M400
  {action_respond_info("M600 :Pauses the current print.")}


#############################################################################
#   X/Y/Z Stepper Config
#############################################################################

[stepper_x]
